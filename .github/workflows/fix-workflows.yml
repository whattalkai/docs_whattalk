name: Fix Workflow Files (Run Once)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "fix" to confirm you want to update workflow files'
        required: true
        type: string

jobs:
  fix:
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'fix' }}
    permissions:
      contents: write
      workflows: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Download latest workflows from template
        run: |
          # Download the latest workflow files from the template repo
          curl -sL https://raw.githubusercontent.com/Autocalls/documentation/main/.github/workflows/rebrand.yml -o .github/workflows/rebrand.yml
          curl -sL https://raw.githubusercontent.com/Autocalls/documentation/main/.github/workflows/sync-updates.yml -o .github/workflows/sync-updates.yml
          
          # Show what was downloaded
          echo "Downloaded workflow files:"
          ls -la .github/workflows/

      - name: Commit updated workflows
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/workflows/
          git commit -m "Update workflow files from template" || echo "No changes to commit"
          git push
          
      - name: Done
        run: |
          echo "✅ Workflow files updated successfully!"
          echo "You can now run 'Sync Updates from Upstream' to get the latest content."
